    <script>

      function hypeSceneLoadHandler(event) {
        const hypeScene = event.target;
        console.log(hypeScene);

        const rangeElem = document.querySelector('.range-container');
        const rangeDragAreaElem = document.querySelector('.range-drag-area');
        const depositInputElem = document.querySelector('.deposit-input');

        const totalElem = document.querySelector('.total');
        const oldRateElem = document.querySelector('.old-rate');
        const newRateElem = document.querySelector('.new-rate');

        console.log(rangeElem);
        console.log(rangeDragAreaElem);
        console.log(1, depositInputElem);
        console.log(totalElem);
        console.log(oldRateElem);
        console.log(newRateElem);

        function updateRangeTrack() {
          const el = rangeDragAreaElem;
          const value = (el.value - el.min) / (el.max - el.min) * 100;
          rangeElem.style.setProperty('--position', `${value}%`);
        }

        function formatMoney(amount) {
          const formatter = new Intl.NumberFormat('ru-RU', {
            style: 'currency',
            currency: 'RUB',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
          });

          return formatter.format(amount);
        }

        function parseMoney(formatted) {
          return parseInt(formatted.replace(/\D/g, ''));
        }

        function updateProfit() {
          const initialRate = 2.6405 / 100;
          const newRate = 2.67396667 / 100;

          const formatted = depositInputElem.value;
          const value = parseInt(formatted.replace(/\D/g, '')); // 1500000

          console.log(value);
          console.log(formatMoney(value));

          let rate;
          let htmlOldRate;
          let htmlNewRate;

          if (value >= 1500000) {
            rate = newRate;
            htmlOldRate = 14.3;
            htmlNewRate = 16;
          } else {
            rate = initialRate;
            htmlOldRate = 14.1;
            htmlNewRate = 15.8;
          }

          const total = Math.floor(value + (value * rate));

          totalElem.innerText = formatMoney(total);
          oldRateElem.innerText = htmlOldRate + '%';
          newRateElem.innerText = htmlNewRate + '%';
        }

        rangeDragAreaElem.addEventListener('input', function () {
          updateRangeTrack();

          depositInputElem.value = formatMoney(this.value)

          updateProfit();
        });

        depositInputElem.addEventListener('focus', function () {
          this.value = parseMoney(this.value);

          updateProfit();
        });

        function onchangeHandler() {
          // Забираем с инпута только числа
          let value = parseMoney(this.value);

          // Минимальный и максимальный предел
          const minValue = 30000;
          const maxValue = 15000000;

          if (value < minValue) {
            value = minValue;
          }

          if (value > maxValue) {
            value = maxValue;
          }

          rangeDragAreaElem.value = value;

          // Форматировать текст
          this.value = formatMoney(value);

          updateRangeTrack();
          updateProfit();
        }

        depositInputElem.addEventListener('blur', onchangeHandler);

        depositInputElem.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            // Программно убираем фокус для того чтобы сработал обработчик blur
            depositInputElem.blur();
          }
        });
      }

      window.addEventListener('HypeSceneLoad', hypeSceneLoadHandler);

    </script>
