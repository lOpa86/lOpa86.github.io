    <script>
      class DepositCalculator {
        constructor(options = {}) {
          this.minValue = options.min || 30000;
          this.maxValue = options.max || 15000000;
          this.step = options.step || 10000;
        }

        init(hypeScene) {
          this.hypeScene = hypeScene;
          this.cacheDom();
          this.bindEvents();
          this.updateRangeTrack();
          this.updateProfit();
        }

        cacheDom() {
          this.dom = {
            rangeContainer: this.hypeScene.querySelector('.range-container'),
            digitInput: this.hypeScene.querySelector('.deposit-input'),
            rangeInput: this.hypeScene.querySelector('.range-drag-area'),
            total: this.hypeScene.querySelector('.total'),
            oldRate: this.hypeScene.querySelector('.old-rate'),
            newRate: this.hypeScene.querySelector('.new-rate')
          };

          // Проверка наличия элементов
          for (const [key, el] of Object.entries(this.dom)) {
            if (!el) console.warn(`Element ${key} not found`);
          }
        }

        bindEvents() {
          this.dom.rangeInput.addEventListener('input', this.onRangeInput.bind(this));
          this.dom.digitInput.addEventListener('focus', this.onFocus.bind(this));
          this.dom.digitInput.addEventListener('blur', this.onBlur.bind(this));
          this.dom.digitInput.addEventListener('keydown', this.onKeydown.bind(this));
        }

        updateRangeTrack() {
          const el = this.dom.rangeInput;
          const value = (el.value - el.min) / (el.max - el.min) * 100;
          this.dom.rangeContainer.style.setProperty('--position', `${value}%`);
        }

        onRangeInput() {
          this.updateRangeTrack();
          this.dom.digitInput.value = this.formatMoney(this.dom.rangeInput.value);
          this.updateProfit();
        }

        onFocus() {
          this.dom.digitInput.value = this.parseMoney(this.dom.digitInput.value);
          this.updateProfit();
        }

        onBlur() {
          let value = this.parseMoney(this.dom.digitInput.value);

          if (value < this.minValue) {
            value = this.minValue;
          }

          if (value > this.maxValue) {
            value = this.maxValue;
          }

          this.dom.rangeInput.value = value;

          // Форматировать текст
          this.dom.digitInput.value = this.formatMoney(value);

          this.updateRangeTrack();
          this.updateProfit();
        }

        onKeydown(event) {
          if (event.key === 'Enter') {
            // Программно убираем фокус для того чтобы сработал обработчик blur
            this.dom.digitInput.blur();
          }
        }

        formatMoney(amount) {
          const formatter = new Intl.NumberFormat('ru-RU', {
            style: 'currency',
            currency: 'RUB',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
          });

          return formatter.format(amount);
        }

        parseMoney(formatted) {
          return parseInt(formatted.replace(/\D/g, ''));
        }

        updateProfit() {
          const initialRate = 2.6405 / 100;
          const newRate = 2.67396667 / 100;

          const value = this.parseMoney(this.dom.digitInput.value);

          let rate;
          let htmlOldRate;
          let htmlNewRate;

          if (value >= 1500000) {
            rate = newRate;
            htmlOldRate = 14.3;
            htmlNewRate = 16;
          } else {
            rate = initialRate;
            htmlOldRate = 14.1;
            htmlNewRate = 15.8;
          }

          const total = Math.floor(value + (value * rate));

          this.dom.total.innerText = this.formatMoney(total);
          this.dom.oldRate.innerText = htmlOldRate + '%';
          this.dom.newRate.innerText = htmlNewRate + '%';
        }
      }

      const depositCalculator = new DepositCalculator();
      console.log(depositCalculator);

      function hypeSceneLoadHandler(event) {
        const hypeScene = event.target;
        depositCalculator.init(hypeScene);
      }

      window.addEventListener('HypeSceneLoad', hypeSceneLoadHandler);

    </script>
